<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F7F5F0;
    color: #0D0D0D;
    min-height: 100vh;
  }
  .hero {
    background: #0D0D0D;
    padding: 32px 40px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }
  .hero-left { display: flex; align-items: center; gap: 16px; }
  .hero-flag { font-size: 36px; }
  .hero-title { font-size: 22px; font-weight: 600; color: #fff; }
  .hero-sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 2px; }
  .hero-stats { display: flex; gap: 24px; }
  .stat { text-align: center; }
  .stat-num { font-size: 26px; font-weight: 600; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; letter-spacing: 0.5px; }
  .stat-num.green { color: #1D9E75; }
  .stat-num.amber { color: #EF9F27; }
  .stat-num.blue { color: #378ADD; }
  .stat-num.red { color: #E24B4A; }

  .map-wrap {
    max-width: 1200px;
    margin: 32px auto;
    padding: 0 24px;
  }

  .legend-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    align-items: center;
  }
  .legend-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 30px;
    border: 1.5px solid #e0ddd8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    background: #fff;
    color: #333;
    user-select: none;
  }
  .legend-pill:hover { border-color: #888; }
  .legend-pill.active { color: #fff; border-color: transparent; }
  .legend-pill .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .map-container {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #e0ddd8;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    position: relative;
  }

  #map svg { display: block; width: 100%; }

  #tooltip {
    display: none;
    position: fixed;
    background: #fff;
    border: 1px solid #e0ddd8;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    min-width: 140px;
  }
  #tt-flag { font-size: 22px; line-height: 1; margin-bottom: 4px; }
  #tt-name { font-weight: 600; color: #0D0D0D; font-size: 14px; }
  #tt-req { font-size: 12px; font-weight: 500; margin-top: 3px; }
  #tt-days { font-size: 11px; color: #888; margin-top: 2px; }

  .source-note {
    font-size: 11px;
    color: #aaa;
    text-align: right;
    margin-top: 8px;
  }
  .source-note a { color: #888; }

  @media (max-width: 640px) {
    .hero { padding: 24px 20px; }
    .hero-stats { gap: 16px; }
    .stat-num { font-size: 20px; }
    .map-wrap { padding: 0 12px; margin: 20px auto; }
  }
</style>
</head>

let activeFilter=null;

function setFilter(f, el) {
  activeFilter = (f==="all") ? null : f;
  document.querySelectorAll('.legend-pill').forEach(p=>{
    p.classList.remove('active');
    p.style.background='';
    p.style.color='';
    p.style.borderColor='';
  });
  if(f==="all"){
    el.style.background="#0D0D0D"; el.style.color="#fff"; el.style.borderColor="#0D0D0D";
  } else {
    el.classList.add('active');
    el.style.background=COLORS[f];
    el.style.borderColor=COLORS[f];
    el.style.color="#fff";
  }
  if(countrySel) countrySel.attr("fill", d => getFill(+d.id));
}

function getFill(iso){
  if(iso===792) return COLORS.turkey;
  const v=isoToVisa[iso];
  if(!v) return "#C8C5BE";
  if(activeFilter && v!==activeFilter) return "#E8E5DF";
  return COLORS[v]||"#C8C5BE";
}

const tt=document.getElementById("tooltip");
let countrySel=null;

const W=960, H=500;
const svg=d3.select("#map").append("svg").attr("viewBox",`0 0 ${W} ${H}`).attr("width","100%");
svg.append("rect").attr("width",W).attr("height",H).attr("fill","#c8dff0");

const proj=d3.geoNaturalEarth1().scale(153).translate([W/2, H/2]);
const path=d3.geoPath(proj);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
  const features=topojson.feature(world,world.objects.countries).features;

  countrySel=svg.selectAll("path.country").data(features).join("path")
    .attr("class","country")
    .attr("d",path)
    .attr("fill",d=>getFill(+d.id))
    .attr("stroke","rgba(255,255,255,0.7)")
    .attr("stroke-width",0.5)
    .style("cursor","pointer")
    .on("mousemove",function(event,d){
      const iso=+d.id;
      if(iso===792){
        document.getElementById("tt-flag").textContent="🇹🇷";
        document.getElementById("tt-name").textContent="Türkiye";
        document.getElementById("tt-req").textContent="Pasaport sahibi ülke";
        document.getElementById("tt-req").style.color=COLORS.turkey;
        document.getElementById("tt-days").textContent="";
      } else {
        const name=isoToName[iso];
        if(!name||!VISA[name]) return;
        const v=VISA[name];
        document.getElementById("tt-flag").textContent=FLAGS[name]||"";
        document.getElementById("tt-name").textContent=TR[name]||name;
        document.getElementById("tt-req").textContent=LABELS[v]||v;
        document.getElementById("tt-req").style.color=COLORS[v];
        document.getElementById("tt-days").textContent=DAYS[name]?`Kalış süresi: ${DAYS[name]}`:"";
      }
      tt.style.display="block";
      tt.style.left=(event.clientX+16)+"px";
      tt.style.top=(event.clientY-10)+"px";
    })
    .on("mouseleave",()=>{ tt.style.display="none"; });

  svg.append("path").datum(topojson.mesh(world,world.objects.countries,(a,b)=>a!==b))
    .attr("fill","none").attr("stroke","rgba(255,255,255,0.5)").attr("stroke-width",0.3).attr("d",path);
});
